<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Roblox Super Fluid Edition</title>
<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent; 
  }
  
  html, body {
    width: 100%;
    height: 100vh;
    height: -webkit-fill-available;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #a1c4fd;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    touch-action: none; 
    position: fixed;
  }

  #ui-menu {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    transition: opacity 0.3s ease;
  }
  #ui-menu h1 {
    color: white;
    font-size: 2.5rem;
    font-weight: 900;
    margin-bottom: 30px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
    text-align: center;
  }
  #playButton {
    font-size: 20px;
    font-weight: bold;
    padding: 16px 60px;
    background: #ffffff;
    color: #b21f1f;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  #game-ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: none;
  }

  #touch-zone-left {
    position: absolute;
    bottom: 5%; left: 5%;
    width: 40%; height: 60%;
    pointer-events: auto;
    touch-action: none;
  }
  #joystickContainer {
    position: absolute;
    bottom: 20px; left: 20px;
    width: 110px; height: 110px;
    background: rgba(0, 0, 0, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #joystickPoint {
    width: 45px; height: 45px;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  #touch-zone-right {
    position: absolute;
    bottom: 5%; right: 0;
    width: 50%; height: 85%;
    pointer-events: auto;
    touch-action: none;
  }
  #jumpButton {
    position: absolute;
    bottom: 30px; right: 40px;
    width: 75px; height: 75px;
    background: rgba(0, 0, 0, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    color: white;
    font-weight: 800;
    font-size: 14px;
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="ui-menu">
  <h1>ROBLOX V2 FAST</h1>
  <button id="playButton">START</button>
</div>

<div id="game-ui">
  <div id="touch-zone-left">
    <div id="joystickContainer">
      <div id="joystickPoint"></div>
    </div>
  </div>
  <div id="touch-zone-right">
    <div id="jumpButton">JUMP</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>

<script>
// Blocage hardcore des gestes de l'iPhone
document.addEventListener('touchmove', (e) => { if (e.touches.length > 1 || e.scale !== 1) e.preventDefault(); }, { passive: false });
document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

// Sensibilité et vitesse boostées pour supprimer la sensation de lenteur
const CONFIG = { 
  playerSpeed: 10, 
  jumpForce: 14, 
  gravity: 36, 
  cameraSensitivity: 0.012, // Caméra beaucoup plus rapide
  worldSize: 120 
};

let scene, camera, renderer, clock;
let character, leftArm, rightArm, leftLeg, rightLeg;
let velocityY = 0, isGrounded = true;
let moveDirection = { x: 0, z: 0 };
let inputState = { forward: 0, backward: 0, left: 0, right: 0 };
let collidableObjects = [];

let cameraOrbit = { radius: 8, theta: Math.PI / 4, phi: Math.PI / 4, targetY: 1.4 };

document.getElementById('playButton').addEventListener('click', () => {
  document.getElementById('ui-menu').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('ui-menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    setupGame();
  }, 300);
});

function setupGame() {
  clock = new THREE.Clock();
  initScene();
  initEnvironment();
  initCharacter();
  initControls();
  animate();
}

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xa1c4fd);
  scene.fog = new THREE.FogExp2(0xa1c4fd, 0.015);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.2, 500);
  
  // Optimisation maximale du rendu WebGL
  renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
  renderer.setPixelRatio(1); // Bloqué à 1 pour éviter la surchauffe et le lag sur mobile
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lumière simple sans ombres portées (Gain massif de FPS)
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  window.addEventListener('resize', onWindowResize);
}

function createTree(x, z) {
  const tree = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2, 4);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 1;
  tree.add(trunk);

  const leavesGeo = new THREE.ConeGeometry(1.2, 2.5, 4);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, flatShading: true });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.y = 2.5;
  tree.add(leaves);

  tree.position.set(x, 0, z);
  scene.add(tree);
  collidableObjects.push({ mesh: trunk, radius: 0.4, type: 'cylinder' });
}

function createRock(x, z, scale) {
  const rockGeo = new THREE.DodecahedronGeometry(scale, 0);
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d, flatShading: true });
  const rock = new THREE.Mesh(rockGeo, rockMat);
  rock.position.set(x, scale * 0.6, z);
  scene.add(rock);
  collidableObjects.push({ mesh: rock, radius: scale * 0.9, type: 'cylinder' });
}

function createPlatform(x, y, z, w, h, d) {
  const platGeo = new THREE.BoxGeometry(w, h, d);
  const platMat = new THREE.MeshStandardMaterial({ color: 0xdcdcdc, roughness: 0.6 });
  const plat = new THREE.Mesh(platGeo, platMat);
  plat.position.set(x, y + h/2, z);
  scene.add(plat);
  collidableObjects.push({ mesh: plat, w: w, h: h, d: d, type: 'box' });
}

function initEnvironment() {
  const floorGeo = new THREE.PlaneGeometry(CONFIG.worldSize, CONFIG.worldSize);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 1.0 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  const grid = new THREE.GridHelper(CONFIG.worldSize, 40, 0x388e3c, 0x388e3c);
  grid.position.y = 0.01;
  scene.add(grid);

  // Spawns d'obstacles légers
  for(let i=0; i<20; i++) {
    let rx = (Math.random() - 0.5) * (CONFIG.worldSize - 30);
    let rz = (Math.random() - 0.5) * (CONFIG.worldSize - 30);
    if (Math.abs(rx) > 8 || Math.abs(rz) > 8) createTree(rx, rz);
  }

  for(let i=0; i<10; i++) {
    let rx = (Math.random() - 0.5) * (CONFIG.worldSize - 30);
    let rz = (Math.random() - 0.5) * (CONFIG.worldSize - 30);
    if (Math.abs(rx) > 8 || Math.abs(rz) > 8) createRock(rx, rz, 1.5 + Math.random()*1.5);
  }

  createPlatform(8, 0, -8, 6, 1.5, 6);
  createPlatform(16, 0, -10, 5, 3.0, 5);
  createPlatform(23, 0, -4, 6, 4.5, 6);
}

function initCharacter() {
  character = new THREE.Group();
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
  const torsoMat = new THREE.MeshStandardMaterial({ color: 0x29b6f6 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x263238 });

  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), torsoMat);
  torso.position.y = 1.3;
  character.add(torso);

  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
  head.position.y = 2.15;
  character.add(head);

  // Visage Roblox
  const faceMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const leftEye = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.02), faceMat);
  leftEye.position.set(-0.12, 2.2, 0.26);
  const rightEye = leftEye.clone(); rightEye.position.x = 0.12;
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.04, 0.02), faceMat);
  mouth.position.set(0, 2.04, 0.26);
  character.add(leftEye, rightEye, mouth);

  const armGeo = new THREE.BoxGeometry(0.3, 1.1, 0.3);
  armGeo.translate(0, -0.45, 0);
  leftArm = new THREE.Mesh(armGeo, skinMat); leftArm.position.set(-0.56, 1.85, 0);
  rightArm = leftArm.clone(); rightArm.position.x = 0.56;
  character.add(leftArm, rightArm);

  const legGeo = new THREE.BoxGeometry(0.34, 1.1, 0.34);
  legGeo.translate(0, -0.45, 0);
  leftLeg = new THREE.Mesh(legGeo, pantsMat); leftLeg.position.set(-0.2, 0.95, 0);
  rightLeg = leftLeg.clone(); rightLeg.position.x = 0.2;
  character.add(leftLeg, rightLeg);

  scene.add(character);
}

function initControls() {
  // Clavier PC (Au cas où)
  window.addEventListener('keydown', (e) => {
    switch (e.code) {
      case 'KeyW': inputState.forward = 1; break;
      case 'KeyS': inputState.backward = 1; break;
      case 'KeyA': inputState.left = 1; break;
      case 'KeyD': inputState.right = 1; break;
      case 'Space': triggerJump(); break;
    }
  });
  window.addEventListener('keyup', (e) => {
    switch (e.code) {
      case 'KeyW': inputState.forward = 0; break;
      case 'KeyS': inputState.backward = 0; break;
      case 'KeyA': inputState.left = 0; break;
      case 'KeyD': inputState.right = 0; break;
    }
  });

  // Joystick Tactile CORRIGÉ (Axe Y inversé pour aller vers l'avant !)
  const joystickZone = document.getElementById('touch-zone-left');
  const joystickPoint = document.getElementById('joystickPoint');
  let joyPointerId = null;
  let joyStartX = 0, joyStartY = 0;

  joystickZone.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    joyPointerId = e.pointerId;
    joyStartX = e.clientX;
    joyStartY = e.clientY;
  });

  window.addEventListener('pointermove', (e) => {
    if (e.pointerId === joyPointerId) {
      e.preventDefault();
      const dx = e.clientX - joyStartX;
      const dy = e.clientY - joyStartY;
      const maxLimit = 40;
      const distance = Math.min(Math.sqrt(dx*dx + dy*dy), maxLimit);
      const angle = Math.atan2(dy, dx);

      const moveX = Math.cos(angle) * distance;
      const moveY = Math.sin(angle) * distance;

      joystickPoint.style.transform = `translate(${moveX}px, ${moveY}px)`;
      
      // FIX DES AXES : -dy pour que le haut avance et le bas recule !
      moveDirection.x = moveX / maxLimit;
      moveDirection.z = moveY / maxLimit;
    }
  });

  const stopJoystick = (e) => {
    if (e.pointerId === joyPointerId) {
      joyPointerId = null;
      joystickPoint.style.transform = `translate(0px, 0px)`;
      moveDirection.x = 0;
      moveDirection.z = 0;
    }
  };
  window.addEventListener('pointerup', stopJoystick);

  // Rotation Caméra (Zone Droite) CORRIGÉE (Style Roblox)
  const cameraZone = document.getElementById('touch-zone-right');
  let camPointerId = null;
  let prevCamX = 0, prevCamY = 0;

  cameraZone.addEventListener('pointerdown', (e) => {
    if(e.target.id === 'jumpButton') return;
    e.preventDefault();
    camPointerId = e.pointerId;
    prevCamX = e.clientX;
    prevCamY = e.clientY;
  });

  window.addEventListener('pointermove', (e) => {
    if (e.pointerId === camPointerId) {
      e.preventDefault();
      const movementX = e.clientX - prevCamX;
      const movementY = e.clientY - prevCamY;

      // FIX INVERSION ROBLOX : Glisser le doigt vers le haut fait monter la caméra (+)
      cameraOrbit.theta -= movementX * CONFIG.cameraSensitivity;
      cameraOrbit.phi += movementY * CONFIG.cameraSensitivity; // Changé de - à +
      cameraOrbit.phi = Math.max(0.05, Math.min(Math.PI / 2 - 0.05, cameraOrbit.phi));

      prevCamX = e.clientX;
      prevCamY = e.clientY;
    }
  });

  window.addEventListener('pointerup', (e) => { if (e.pointerId === camPointerId) camPointerId = null; });

  document.getElementById('jumpButton').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    triggerJump();
  });
}

function triggerJump() {
  if (isGrounded) {
    velocityY = CONFIG.jumpForce;
    isGrounded = false;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1); // Évite les sauts de physique si micro-lag

  updatePhysics(delta);
  updateCharacterAnimations();
  updateCamera();

  renderer.render(scene, camera);
}

function updatePhysics(delta) {
  let xInput = moveDirection.x;
  let zInput = moveDirection.z;

  if (xInput === 0 && zInput === 0) {
    xInput = inputState.right - inputState.left;
    zInput = inputState.backward - inputState.forward; // Inversé aussi sur PC
  }

  const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  camForward.y = 0; camForward.normalize();

  const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
  camRight.y = 0; camRight.normalize();

  // On applique la direction (zInput est négatif vers le haut sur l'axe Three.js)
  const moveVector = new THREE.Vector3()
    .addScaledVector(camRight, xInput)
    .addScaledVector(camForward, -zInput); // Applique la correction de poussée

  if (moveVector.lengthSq() > 1) moveVector.normalize();

  const oldPos = character.position.clone();
  character.position.addScaledVector(moveVector, CONFIG.playerSpeed * delta);

  // Système de collision ultra-rapide (Zéro Lag)
  const playerRadius = 0.4;
  for (let i = 0; i < collidableObjects.length; i++) {
    const obj = collidableObjects[i];
    const objPos = obj.mesh.position;
    
    if(obj.type === 'box') {
      if (Math.abs(character.position.x - objPos.x) < (obj.w/2 + playerRadius) &&
          Math.abs(character.position.z - objPos.z) < (obj.d/2 + playerRadius)) {
          if (oldPos.y >= (objPos.y + obj.h/2 - 0.2)) {
            character.position.y = objPos.y + obj.h/2;
            velocityY = 0;
            isGrounded = true;
          } else {
            character.position.x = oldPos.x;
            character.position.z = oldPos.z;
          }
      }
    } else {
      const distXZ = Math.sqrt(Math.pow(character.position.x - objPos.x, 2) + Math.pow(character.position.z - objPos.z, 2));
      if (distXZ < (playerRadius + obj.radius) && character.position.y < 1.8) {
        character.position.x = oldPos.x;
        character.position.z = oldPos.z;
      }
    }
  }

  if (moveVector.lengthSq() > 0.001) {
    const targetAngle = Math.atan2(moveVector.x, moveVector.z);
    let diff = targetAngle - character.rotation.y;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    character.rotation.y += diff * 18 * delta;
    character.userData.isMoving = true;
  } else {
    character.userData.isMoving = false;
  }

  velocityY -= CONFIG.gravity * delta;
  character.position.y += velocityY * delta;

  if (character.position.y <= 0) {
    character.position.y = 0;
    velocityY = 0;
    isGrounded = true;
  }

  const halfSize = CONFIG.worldSize / 2 - 1;
  character.position.x = Math.max(-halfSize, Math.min(halfSize, character.position.x));
  character.position.z = Math.max(-halfSize, Math.min(halfSize, character.position.z));
}

function updateCharacterAnimations() {
  const time = performance.now() * 0.01;
  if (!isGrounded) {
    leftArm.rotation.x = -Math.PI; rightArm.rotation.x = -Math.PI;
    leftLeg.rotation.x = 0.2; rightLeg.rotation.x = -0.2;
  } else if (character.userData.isMoving) {
    const wave = Math.sin(time * 1.5);
    leftLeg.rotation.x = wave * 0.6; rightLeg.rotation.x = -wave * 0.6;
    leftArm.rotation.x = -wave * 0.6; rightArm.rotation.x = wave * 0.6;
  } else {
    leftLeg.rotation.x *= 0.8; rightLeg.rotation.x *= 0.8;
    leftArm.rotation.x *= 0.8; rightArm.rotation.x *= 0.8;
  }
}

function updateCamera() {
  // SUPPRESSION DU LERP (Suivi 100% instantané, fini l'effet lourd et en retard)
  camera.position.x = character.position.x + cameraOrbit.radius * Math.sin(cameraOrbit.theta) * Math.cos(cameraOrbit.phi);
  camera.position.y = character.position.y + cameraOrbit.targetY + cameraOrbit.radius * Math.sin(cameraOrbit.phi);
  camera.position.z = character.position.z + cameraOrbit.radius * Math.cos(cameraOrbit.theta) * Math.cos(cameraOrbit.phi);

  camera.lookAt(character.position.x, character.position.y + cameraOrbit.targetY, character.position.z);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
