<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jeu simple - Déplacement personnage</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* Menu */
  #menu {
    background: #333;
    padding: 10px;
    display: flex;
  }

  #menu button {
    background: #555;
    color: #fff;
    border: none;
    padding: 10px 20px;
    margin-right: 10px;
    cursor: pointer;
    font-size: 16px;
  }

  #menu button:hover {
    background: #777;
  }

  /* Zone de jeu */
  #gameArea {
    position: relative;
    width: 800px;
    height: 600px;
    margin: 20px auto;
    background: #f0f0f0;
    border: 2px solid #ccc;
    display: none; /* Caché au début */
  }

  /* Personnage */
  #character {
    position: absolute;
    width: 50px;
    height: 50px;
    background: red;
    top: 275px; /* Centré initialement */
    left: 375px;
  }
</style>
</head>
<body>

<!-- Menu -->
<div id="menu">
  <button id="playBtn">PLAY</button>
</div>

<!-- Zone de jeu -->
<div id="gameArea">
  <div id="character"></div>
</div>

<script>
  const playBtn = document.getElementById('playBtn');
  const gameArea = document.getElementById('gameArea');
  const character = document.getElementById('character');

  // Afficher la zone de jeu quand on clique sur PLAY
  playBtn.addEventListener('click', () => {
    gameArea.style.display = 'block';
    // Reset position
    character.style.top = '275px';
    character.style.left = '375px';
  });

  // Variables pour la position
  let posX = 375;
  let posY = 275;
  const step = 10; // Nombre de pixels pour chaque déplacement

  // Écouter les touches
  document.addEventListener('keydown', (e) => {
    switch(e.key) {
      case 'ArrowUp':
        if (posY - step >= 0) {
          posY -= step;
        }
        break;
      case 'ArrowDown':
        if (posY + step <= 550) { // 600 - 50 (hauteur personnage)
          posY += step;
        }
        break;
      case 'ArrowLeft':
        if (posX - step >= 0) {
          posX -= step;
        }
        break;
      case 'ArrowRight':
        if (posX + step <= 750) { // 800 - 50 (largeur personnage)
          posX += step;
        }
        break;
    }
    // Mettre à jour la position
    character.style.top = posY + 'px';
    character.style.left = posX + 'px';
  });
</script>

</body>
</html>
