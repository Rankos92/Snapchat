<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jeu 3D avec déplacement joystick</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial; }

  /* Bouton Play centré */
  #playButton {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    padding: 20px 40px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 10;
  }

  /* Conteneur pour le joystick */
  #joystickContainer {
    position: absolute;
    bottom: 20px; left: 20px;
    width: 150px; height: 150px;
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    display: none; /* caché au début */
    touch-action: none;
  }

  /* La zone de la zone de rendu */
  canvas { display: block; }
</style>
</head>
<body>

<!-- Bouton Play -->
<button id="playButton">PLAY</button>

<!-- Conteneur joystick -->
<div id="joystickContainer"></div>

<!-- Script Three.js et gestion joystick -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let character;
let moveX = 0, moveZ = 0;
let clock = new THREE.Clock();

const startGame = () => {
  document.getElementById('playButton').style.display = 'none';
  document.getElementById('joystickContainer').style.display = 'block';

  init();
  animate();
};

document.getElementById('playButton').addEventListener('click', startGame);

// Initialisation de la scène
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 10);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Sol
  const floorGeo = new THREE.PlaneGeometry(50, 50);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x228b22 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Personnage (cube)
  const personGeo = new THREE.BoxGeometry(1, 2, 1);
  const personMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
  character = new THREE.Mesh(personGeo, personMat);
  character.position.y = 1;
  scene.add(character);

  // Lumière
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7.5);
  scene.add(dirLight);

  // Gestion du resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Ajout du contrôleur tactile (Joystick personnalisé)
  initJoystick();
}

// Animation
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Déplacement du personnage
  character.position.x += moveX * delta * 5;
  character.position.z += moveZ * delta * 5;

  // Limites
  character.position.x = Math.max(-24, Math.min(24, character.position.x));
  character.position.z = Math.max(-24, Math.min(24, character.position.z));

  // La caméra suit le personnage
  camera.position.x = character.position.x;
  camera.position.z = character.position.z + 10;
  camera.lookAt(character.position);

  renderer.render(scene, camera);
}

// Initialisation du joystick
function initJoystick() {
  const container = document.getElementById('joystickContainer');
  let pointerId = null;
  let startX = 0, startY=0;
  let currentX=0, currentY=0;

  // Fonction pour mettre à jour la direction
  const updateDirection = () => {
    const dx = currentX - startX;
    const dy = currentY - startY;
    const maxDist = 50;

    // Normaliser
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxDist);
    if(dist > 10) {
      moveX = (dx / dist) || 0;
      moveZ = (dy / dist) || 0;
    } else {
      moveX = 0;
      moveZ = 0;
    }
  };

  container.addEventListener('pointerdown', (e) => {
    pointerId = e.pointerId;
    startX = e.clientX;
    startY = e.clientY;
    currentX = startX;
    currentY = startY;
  });

  container.addEventListener('pointermove', (e) => {
    if(e.pointerId === pointerId) {
      currentX = e.clientX;
      currentY = e.clientY;
      updateDirection();
    }
  });

  container.addEventListener('pointerup', (e) => {
    if(e.pointerId === pointerId) {
      pointerId = null;
      moveX = 0;
      moveZ = 0;
    }
  });
}
</script>

</body>
</html>
