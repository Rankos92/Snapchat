<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Roblox Prototype Standard Pro - Three.js</title>
<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }
  body { 
    margin: 0; 
    overflow: hidden; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: #111;
  }

  /* Écran de démarrage */
  #ui-menu {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, #1e3c72 0%, #2a5298 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    transition: opacity 0.5s ease;
  }
  #ui-menu h1 {
    color: white;
    font-size: 3rem;
    margin-bottom: 20px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  #playButton {
    font-size: 24px;
    font-weight: bold;
    padding: 15px 50px;
    background: #00e676;
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,230,118,0.4);
    transition: transform 0.2s, background 0.2s;
  }
  #playButton:hover {
    transform: scale(1.05);
    background: #00c853;
  }

  /* Interface de Jeu */
  #game-ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; /* Laisse passer les clics vers le canvas */
    display: none;
  }

  /* Zone tactile gauche : Joystick */
  #touch-zone-left {
    position: absolute;
    bottom: 0; left: 0;
    width: 50%; height: 60%;
    pointer-events: auto;
  }
  #joystickContainer {
    position: absolute;
    bottom: 40px; left: 40px;
    width: 140px; height: 140px;
    background: rgba(255, 255, 255, 0.15);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #joystickPoint {
    width: 50px; height: 50px;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.05s linear;
  }

  /* Zone tactile droite : Caméra & Saut */
  #touch-zone-right {
    position: absolute;
    bottom: 0; right: 0;
    width: 50%; height: 100%;
    pointer-events: auto;
  }
  #jumpButton {
    position: absolute;
    bottom: 50px; right: 50px;
    width: 80px; height: 80px;
    background: rgba(255, 255, 255, 0.25);
    border: 3px solid #fff;
    border-radius: 50%;
    color: white;
    font-weight: bold;
    font-size: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    cursor: pointer;
  }
  #jumpButton:active {
    background: rgba(255, 255, 255, 0.5);
    transform: scale(0.95);
  }

  /* Indicateur de contrôles pour PC */
  #pc-info {
    position: absolute;
    top: 15px; left: 15px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 13px;
    pointer-events: none;
  }

  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="ui-menu">
  <h1>ROBLOX SANDBOX 3D</h1>
  <button id="playButton">COMMENCER</button>
</div>

<div id="game-ui">
  <div id="pc-info">
    <strong>Contrôles PC :</strong><br>
    • Z, Q, S, D ou Flèches : Se déplacer<br>
    • Espace : Sauter<br>
    • Clic gauche + Glisser : Tourner la caméra
  </div>
  
  <div id="touch-zone-left">
    <div id="joystickContainer">
      <div id="joystickPoint"></div>
    </div>
  </div>
  
  <div id="touch-zone-right">
    <div id="jumpButton">JUMP</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>

<script>
// --- CONFIGURATION DU JEU ---
const CONFIG = {
  playerSpeed: 7,
  jumpForce: 12,
  gravity: 32,
  cameraSensitivity: 0.005,
  worldSize: 100
};

// --- VARIABLES GLOBALES ---
let scene, camera, renderer, clock;
let character, leftArm, rightArm, leftLeg, rightLeg;

// Physique & États
let velocityY = 0;
let isGrounded = true;
let moveDirection = { x: 0, z: 0 };
let inputState = { forward: 0, backward: 0, left: 0, right: 0 };

// Caméra Orbite (Style Roblox)
let cameraOrbit = {
  radius: 8,
  theta: Math.PI / 4, // Rotation horizontale
  phi: Math.PI / 3,    // Rotation verticale
  targetY: 1.5
};

// --- INITIALISATION AU CLIC PLAY ---
document.getElementById('playButton').addEventListener('click', () => {
  document.getElementById('ui-menu').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('ui-menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    setupGame();
  }, 500);
});

function setupGame() {
  clock = new THREE.Clock();
  
  initScene();
  initEnvironment();
  initCharacter();
  initControls();
  
  animate();
}

// --- CREATION DE LA SCENE ---
function initScene() {
  scene = new THREE.Scene();
  // Brouillard pour donner de la profondeur
  scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lumières
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
  hemiLight.position.set(0, 200, 0);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(20, 40, 20);
  dirLight.castShadow = true;
  dirLight.shadow.camera.top = 50;
  dirLight.shadow.camera.bottom = -50;
  dirLight.shadow.camera.left = -50;
  dirLight.shadow.camera.right = 50;
  dirLight.shadow.camera.near = 0.1;
  dirLight.shadow.camera.far = 200;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);

  window.addEventListener('resize', onWindowResize);
}

// --- GENERATION DU MONDE ---
function initEnvironment() {
  // Ciel / Arrière-plan
  renderer.setClearColor(0x87ceeb, 1);

  // Sol texturé par grille
  const floorGeo = new THREE.PlaneGeometry(CONFIG.worldSize, CONFIG.worldSize);
  const floorMat = new THREE.MeshStandardMaterial({ 
    color: 0x3a9d23, 
    roughness: 0.8 
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  const grid = new THREE.GridHelper(CONFIG.worldSize, 50, 0x225511, 0x2e7d32);
  grid.position.y = 0.01;
  scene.add(grid);

  // Obstacles de test (Cubes colorés)
  const boxGeo = new THREE.BoxGeometry(3, 3, 3);
  for(let i=0; i<15; i++) {
    const boxMat = new THREE.MeshStandardMaterial({ 
      color: Math.random() * 0xffffff,
      roughness: 0.4
    });
    const box = new THREE.Mesh(boxGeo, boxMat);
    box.position.set(
      (Math.random() - 0.5) * (CONFIG.worldSize - 20),
      1.5,
      (Math.random() - 0.5) * (CONFIG.worldSize - 20)
    );
    box.castShadow = true;
    box.receiveShadow = true;
    scene.add(box);
  }
}

// --- DESIGN DU PERSONNAGE (Modulaire pour Animations) ---
function initCharacter() {
  character = new THREE.Group();

  // Matériaux de base
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 });
  const torsoMat = new THREE.MeshStandardMaterial({ color: 0x00bcd4, roughness: 0.5 }); // Bleu Roblox
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x3f51b5, roughness: 0.5 });

  // 1. Torse (Pivot central du corps)
  const torsoGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.y = 1.3;
  torso.castShadow = true;
  character.add(torso);

  // 2. Tête
  const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const head = new THREE.Mesh(headGeo, skinMat);
  head.position.y = 2.1;
  head.castShadow = true;
  character.add(head);

  // Visage pixelisé simple
  const eyeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.02);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  leftEye.position.set(-0.12, 2.15, 0.26);
  const rightEye = leftEye.clone();
  rightEye.position.x = 0.12;
  character.add(leftEye, rightEye);

  // 3. BRAS (Avec groupe pivot pour rotation naturelle)
  const armGeo = new THREE.BoxGeometry(0.3, 1.0, 0.3);
  armGeo.translate(0, -0.4, 0); // Décale le mesh vers le bas pour mettre le pivot en haut

  leftArm = new THREE.Mesh(armGeo, skinMat);
  leftArm.position.set(-0.6, 1.8, 0);
  leftArm.castShadow = true;
  character.add(leftArm);

  rightArm = leftArm.clone();
  rightArm.position.x = 0.6;
  character.add(rightArm);

  // 4. JAMBES
  const legGeo = new THREE.BoxGeometry(0.35, 1.0, 0.35);
  legGeo.translate(0, -0.4, 0); // Pivot au niveau de la hanche

  leftLeg = new THREE.Mesh(legGeo, pantsMat);
  leftLeg.position.set(-0.22, 0.9, 0);
  leftLeg.castShadow = true;
  character.add(leftLeg);

  rightLeg = leftLeg.clone();
  rightLeg.position.x = 0.22;
  character.add(rightLeg);

  // Ajustement de la hauteur générale
  character.position.set(0, 0, 0);
  scene.add(character);
}

// --- ETRE DE CONTROLE & CAPTEURS TACTILES ---
function initControls() {
  // --- CLAVIER PC ---
  window.addEventListener('keydown', (e) => {
    switch (e.code) {
      case 'KeyW': case 'ArrowUp':    inputState.forward = 1; break;
      case 'KeyS': case 'ArrowDown':  inputState.backward = 1; break;
      case 'KeyA': case 'ArrowLeft':  inputState.left = 1; break;
      case 'KeyD': case 'ArrowRight': inputState.right = 1; break;
      case 'Space':                   triggerJump(); break;
    }
  });

  window.addEventListener('keyup', (e) => {
    switch (e.code) {
      case 'KeyW': case 'ArrowUp':    inputState.forward = 0; break;
      case 'KeyS': case 'ArrowDown':  inputState.backward = 0; break;
      case 'KeyA': case 'ArrowLeft':  inputState.left = 0; break;
      case 'KeyD': case 'ArrowRight': inputState.right = 0; break;
    }
  });

  // --- CONFIGURATION JOYSTICK TACTILE ---
  const joystickZone = document.getElementById('touch-zone-left');
  const joystickPoint = document.getElementById('joystickPoint');
  let joyPointerId = null;
  let joyStartX = 0, joyStartY = 0;

  joystickZone.addEventListener('pointerdown', (e) => {
    if (joyPointerId !== null) return;
    joyPointerId = e.pointerId;
    joyStartX = e.clientX;
    joyStartY = e.clientY;
  });

  window.addEventListener('pointermove', (e) => {
    if (e.pointerId === joyPointerId) {
      const dx = e.clientX - joyStartX;
      const dy = e.clientY - joyStartY;
      const maxLimit = 50;
      const distance = Math.min(Math.sqrt(dx*dx + dy*dy), maxLimit);
      const angle = Math.atan2(dy, dx);

      const moveX = Math.cos(angle) * distance;
      const moveY = Math.sin(angle) * distance;

      joystickPoint.style.transform = `translate(${moveX}px, ${moveY}px)`;

      // Liaison avec les vecteurs de mouvements
      moveDirection.x = moveX / maxLimit;
      moveDirection.z = moveY / maxLimit;
    }
  });

  const stopJoystick = (e) => {
    if (e.pointerId === joyPointerId) {
      joyPointerId = null;
      joystickPoint.style.transform = `translate(0px, 0px)`;
      moveDirection.x = 0;
      moveDirection.z = 0;
    }
  };
  window.addEventListener('pointerup', stopJoystick);
  window.addEventListener('pointercancel', stopJoystick);

  // --- SOURIS & GLISSEMENT ECRAN (Caméra type Roblox) ---
  const cameraZone = document.getElementById('touch-zone-right');
  let camPointerId = null;
  let prevCamX = 0, prevCamY = 0;

  cameraZone.addEventListener('pointerdown', (e) => {
    // Si on clique sur le bouton Jump, on annule la rotation caméra
    if(e.target.id === 'jumpButton') return;
    camPointerId = e.pointerId;
    prevCamX = e.clientX;
    prevCamY = e.clientY;
  });

  window.addEventListener('pointermove', (e) => {
    if (e.pointerId === camPointerId) {
      const movementX = e.clientX - prevCamX;
      const movementY = e.clientY - prevCamY;

      cameraOrbit.theta -= movementX * CONFIG.cameraSensitivity;
      cameraOrbit.phi -= movementY * CONFIG.cameraSensitivity;

      // Verrouillage vertical pour éviter de retourner la caméra cul par dessus tête
      cameraOrbit.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, cameraOrbit.phi));

      prevCamX = e.clientX;
      prevCamY = e.clientY;
    }
  });

  window.addEventListener('pointerup', (e) => {
    if (e.pointerId === camPointerId) camPointerId = null;
  });

  // Action Bouton Jump Mobile
  document.getElementById('jumpButton').addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    triggerJump();
  });
}

function triggerJump() {
  if (isGrounded) {
    velocityY = CONFIG.jumpForce;
    isGrounded = false;
  }
}

// --- BOUCLE DE MISE À JOUR (TICK) ---
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  if(delta > 0.1) return; // Sécurité anti-lag

  updatePhysics(delta);
  updateCharacterAnimations();
  updateCamera();

  renderer.render(scene, camera);
}

// --- CALCUL DES DEPLACEMENTS ET DE LA PHYSIQUE ---
function updatePhysics(delta) {
  // 1. Récupération des entrées clavier si le joystick n'est pas utilisé
  let xInput = moveDirection.x;
  let zInput = moveDirection.z;

  if (xInput === 0 && zInput === 0) {
    xInput = inputState.right - inputState.left;
    zInput = inputState.backward - inputState.forward;
  }

  // 2. Calcul des vecteurs de direction par rapport à la caméra
  // Permet de reculer quand on pousse le joystick vers le bas *par rapport à l'écran*
  const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  camForward.y = 0;
  camForward.normalize();

  const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
  camRight.y = 0;
  camRight.normalize();

  const moveVector = new THREE.Vector3()
    .addScaledVector(camRight, xInput)
    .addScaledVector(camForward, zInput);

  if (moveVector.lengthSq() > 1) moveVector.normalize();

  // 3. Déplacement du personnage
  character.position.addScaledVector(moveVector, CONFIG.playerSpeed * delta);

  // Rotation douce vers la direction de déplacement
  if (moveVector.lengthSq() > 0.001) {
    const targetAngle = Math.atan2(moveVector.x, moveVector.z);
    // Interpolation linéaire de l'angle pour fluidifier le demi-tour
    let diff = targetAngle - character.rotation.y;
    // Normalisation de l'angle entre -PI et PI
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    character.rotation.y += diff * 15 * delta;
    character.userData.isMoving = true;
  } else {
    character.userData.isMoving = false;
  }

  // 4. Gravité et gestion du saut
  velocityY -= CONFIG.gravity * delta;
  character.position.y += velocityY * delta;

  // Collision basique avec le sol naturel
  if (character.position.y <= 0) {
    character.position.y = 0;
    velocityY = 0;
    isGrounded = true;
  }

  // Limites de la map mondiale
  const halfSize = CONFIG.worldSize / 2 - 1;
  character.position.x = Math.max(-halfSize, Math.min(halfSize, character.position.x));
  character.position.z = Math.max(-halfSize, Math.min(halfSize, character.position.z));
}

// --- MOTEUR D'ANIMATION PROCÉDURALE ---
function updateCharacterAnimations() {
  const time = performance.now() * 0.008; // Vitesse de l'animation
  
  if (!isGrounded) {
    // Animation de Saut (Bras en l'air, jambes figées)
    leftArm.rotation.x = -Math.PI;
    rightArm.rotation.x = -Math.PI;
    leftLeg.rotation.x = 0.2;
    rightLeg.rotation.x = -0.2;
  } 
  else if (character.userData.isMoving) {
    // Animation de Course/Marche alternée en sinus (Style Roblox classique)
    const wave = Math.sin(time * 1.5);
    
    leftLeg.rotation.x = wave * 0.6;
    rightLeg.rotation.x = -wave * 0.6;
    
    leftArm.rotation.x = -wave * 0.6;
    rightArm.rotation.x = wave * 0.6;
  } 
  else {
    // Retour doux à la position de repos (Idle)
    leftLeg.rotation.x *= 0.8;
    rightLeg.rotation.x *= 0.8;
    leftArm.rotation.x *= 0.8;
    rightArm.rotation.x *= 0.8;
  }
}

// --- CALCUL ET SUIVI COMPORTEMENTAL CAMERA ---
function updateCamera() {
  // Calcul de la position orbitale sphérique autour du joueur
  const targetX = character.position.x + cameraOrbit.radius * Math.sin(cameraOrbit.theta) * Math.cos(cameraOrbit.phi);
  const targetY = character.position.y + cameraOrbit.targetY + cameraOrbit.radius * Math.sin(cameraOrbit.phi);
  const targetZ = character.position.z + cameraOrbit.radius * Math.cos(cameraOrbit.theta) * Math.cos(cameraOrbit.phi);

  // Interpolation de la caméra (Lerp) pour donner un effet de fluidité cinématographique amorti
  camera.position.x += (targetX - camera.position.x) * 0.15;
  camera.position.y += (targetY - camera.position.y) * 0.15;
  camera.position.z += (targetZ - camera.position.z) * 0.15;

  // La caméra regarde toujours le buste du personnage
  const lookTarget = new THREE.Vector3(character.position.x, character.position.y + cameraOrbit.targetY, character.position.z);
  camera.lookAt(lookTarget);
}

// --- REDIMENSIONNEMENT FENÊTRE ---
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
