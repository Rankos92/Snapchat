<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Advanced Realistic Motion Engine</title>
<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent; 
  }
  html, body {
    width: 100%; height: 100vh; height: -webkit-fill-available;
    margin: 0; padding: 0; overflow: hidden;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    touch-action: none; position: fixed;
  }
  #ui-menu {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100; transition: opacity 0.3s ease;
  }
  #ui-menu h1 {
    color: #f8fafc; font-size: 2rem; font-weight: 800;
    margin-bottom: 30px; text-align: center; letter-spacing: 2px;
  }
  #playButton {
    font-size: 18px; font-weight: 700; padding: 16px 60px;
    background: #3b82f6; color: #ffffff; border: none; border-radius: 50px;
    cursor: pointer; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
  }
  #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
  #touch-zone-left { position: absolute; bottom: 5%; left: 5%; width: 40%; height: 60%; pointer-events: auto; touch-action: none; }
  #joystickContainer {
    position: absolute; bottom: 20px; left: 20px; width: 110px; height: 110px;
    background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%; backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center;
  }
  #joystickPoint { width: 45px; height: 45px; background: #ffffff; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  #touch-zone-right { position: absolute; bottom: 5%; right: 0; width: 50%; height: 85%; pointer-events: auto; touch-action: none; }
  #jumpButton {
    position: absolute; bottom: 30px; right: 40px; width: 80px; height: 80px;
    background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%; color: white; font-weight: 800; font-size: 14px;
    backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center;
  }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="ui-menu">
  <h1>ANATOMY MOTION ENGINE</h1>
  <button id="playButton">START SYSTEM</button>
</div>

<div id="game-ui">
  <div id="touch-zone-left"><div id="joystickContainer"><div id="joystickPoint"></div></div></div>
  <div id="touch-zone-right"><div id="jumpButton">JUMP</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>

<script>
// Blocages stricts des gestes natifs iOS
document.addEventListener('touchmove', (e) => { if (e.touches.length > 1 || e.scale !== 1) e.preventDefault(); }, { passive: false });
document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

const CONFIG = { 
  maxSpeed: 8.5, acceleration: 40, friction: 9,
  jumpForce: 12.5, gravity: 32, cameraSensitivity: 0.012, worldSize: 160 
};

let scene, camera, renderer, clock;
let moveDirection = { x: 0, z: 0 };
let currentVelocity = new THREE.Vector3();
let velocityY = 0, isGrounded = true;
let collidableObjects = [];

// Squelette Anatomique Complet
let playerGroup, pelvis, torso, head;
let leftThigh, leftShin, leftFoot;
let rightThigh, rightShin, rightFoot;
let leftUpperArm, leftForearm, rightUpperArm, rightForearm;

let cameraOrbit = { radius: 7, theta: Math.PI / 4, phi: Math.PI / 6, targetY: 1.25 };
let jumpPhase = 'grounded'; // 'grounded', 'takeoff', 'air', 'landing'
let landingTimer = 0, takeoffTimer = 0;

document.getElementById('playButton').addEventListener('click', () => {
  document.getElementById('ui-menu').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('ui-menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    setupGame();
  }, 300);
});

function setupGame() {
  clock = new THREE.Clock();
  initScene();
  initEnvironment();
  initAnatomicalCharacter();
  initControls();
  animate();
}

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f172a);
  scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 400);
  
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Éclairage studio anatomique pour faire ressortir les formes des muscles
  const ambient = new THREE.AmbientLight(0x334155, 0.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xf8fafc, 0.8);
  sun.position.set(15, 30, 15);
  scene.add(sun);

  const rimLight = new THREE.DirectionalLight(0x38bdf8, 0.5); // Effet de contour bleu réaliste
  rimLight.position.set(-15, 10, -15);
  scene.add(rimLight);

  window.addEventListener('resize', onWindowResize);
}

function initEnvironment() {
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(CONFIG.worldSize, CONFIG.worldSize),
    new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  const grid = new THREE.GridHelper(CONFIG.worldSize, 60, 0x475569, 0x334155);
  grid.position.y = 0.005;
  scene.add(grid);

  createObstacle(0, 0, -20, 10, 2, 10);
  createObstacle(15, 0, -15, 6, 4, 6);
}

function createObstacle(x, y, z, w, h, d) {
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.5 })
  );
  box.position.set(x, y + h/2, z);
  scene.add(box);
  collidableObjects.push({ mesh: box, w: w, h: h, d: d });
}

// CONSTRUCTION DE L'ANATOMIE HUMAINE (Muscles et Articulations)
function initAnatomicalCharacter() {
  playerGroup = new THREE.Group();
  
  // Matériau type "écorché/modèle 3D" réaliste gris neutre comme sur ton image
  const muscleMat = new THREE.MeshStandardMaterial({ 
    color: 0x94a3b8, 
    roughness: 0.5,
    metalness: 0.1
  });

  // Pelvis (Le centre de gravité du corps)
  pelvis = new THREE.Group();
  pelvis.position.y = 0.95; 
  playerGroup.add(pelvis);

  const pelvisMesh = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), muscleMat);
  pelvisMesh.scale.set(1.3, 0.8, 1);
  pelvis.add(pelvisMesh);

  // Torse / Cage Thoracique (Forme en V)
  torso = new THREE.Group();
  torso.position.y = 0.15;
  pelvis.add(torso);

  const chestMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.16, 0.55, 16), muscleMat);
  chestMesh.position.y = 0.275;
  chestMesh.scale.set(1.2, 1, 0.9); // Plus large sur les côtés
  torso.add(chestMesh);

  // Épaules (Deltoïdes)
  const shoulderGeo = new THREE.SphereGeometry(0.09, 12, 12);
  const leftShoulder = new THREE.Mesh(shoulderGeo, muscleMat);
  leftShoulder.position.set(-0.28, 0.5, 0);
  torso.add(leftShoulder);
  
  const rightShoulder = leftShoulder.clone();
  rightShoulder.position.x = 0.28;
  torso.add(rightShoulder);

  // Cou et Tête
  head = new THREE.Group();
  head.position.y = 0.58;
  torso.add(head);

  const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.12, 10), muscleMat);
  neckMesh.position.y = 0.06;
  head.add(neckMesh);

  const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), muscleMat);
  headMesh.position.y = 0.22;
  headMesh.scale.set(0.9, 1.1, 1); // Crâne ovalisé
  head.add(headMesh);

  // CUISSES ET MOLLETS GALBÉS (Capsules pour le réalisme musculaire)
  // Jambe Gauche
  leftThigh = new THREE.Group();
  leftThigh.position.set(-0.14, -0.05, 0);
  const ltMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.11, 0.35, 8, 16), muscleMat);
  ltMesh.position.y = -0.22;
  leftThigh.add(ltMesh);
  pelvis.add(leftThigh);

  leftShin = new THREE.Group();
  leftShin.position.y = -0.42;
  const lsMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.35, 8, 16), muscleMat);
  lsMesh.position.y = -0.22;
  lsMesh.scale.set(1.1, 1, 0.9); // Mollet sculpté
  leftShin.add(lsMesh);
  leftThigh.add(leftShin);

  leftFoot = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.18), muscleMat);
  leftFoot.position.set(0, -0.43, 0.05);
  leftShin.add(leftFoot);

  // Jambe Droite
  rightThigh = new THREE.Group();
  rightThigh.position.set(0.14, -0.05, 0);
  const rtMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.11, 0.35, 8, 16), muscleMat);
  rtMesh.position.y = -0.22;
  rightThigh.add(rtMesh);
  pelvis.add(rightThigh);

  rightShin = new THREE.Group();
  rightShin.position.y = -0.42;
  const rsMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.35, 8, 16), muscleMat);
  rsMesh.position.y = -0.22;
  rsMesh.scale.set(1.1, 1, 0.9);
  rightShin.add(rsMesh);
  rightThigh.add(rightShin);

  rightFoot = leftFoot.clone();
  rightFoot.position.set(0, -0.43, 0.05);
  rightShin.add(rightFoot);

  // BRAS ANATOMIQUES
  // Bras Gauche
  leftUpperArm = new THREE.Group();
  leftUpperArm.position.set(-0.28, 0.5, 0);
  const luaMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.28, 6, 12), muscleMat);
  luaMesh.position.y = -0.18;
  leftUpperArm.add(luaMesh);
  torso.add(leftUpperArm);

  leftForearm = new THREE.Group();
  leftForearm.position.y = -0.34;
  const lfaMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.065, 0.26, 6, 12), muscleMat);
  lfaMesh.position.y = -0.16;
  leftForearm.add(lfaMesh);
  leftUpperArm.add(leftForearm);

  // Bras Droit
  rightUpperArm = new THREE.Group();
  rightUpperArm.position.set(0.28, 0.5, 0);
  const ruaMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.28, 6, 12), muscleMat);
  ruaMesh.position.y = -0.18;
  rightUpperArm.add(ruaMesh);
  torso.add(rightUpperArm);

  rightForearm = new THREE.Group();
  rightForearm.position.y = -0.34;
  const rfaMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.065, 0.26, 6, 12), muscleMat);
  rfaMesh.position.y = -0.16;
  rightForearm.add(rfaMesh);
  rightUpperArm.add(rightForearm);

  scene.add(playerGroup);
}

function initControls() {
  const joystickZone = document.getElementById('touch-zone-left');
  const joystickPoint = document.getElementById('joystickPoint');
  let joyPointerId = null;
  let joyStartX = 0, joyStartY = 0;

  joystickZone.addEventListener('pointerdown', (e) => {
    e.preventDefault(); joyPointerId = e.pointerId;
    joyStartX = e.clientX; joyStartY = e.clientY;
  });

  window.addEventListener('pointermove', (e) => {
    if (e.pointerId === joyPointerId) {
      e.preventDefault();
      const dx = e.clientX - joyStartX; const dy = e.clientY - joyStartY;
      const maxLimit = 42;
      const distance = Math.min(Math.sqrt(dx*dx + dy*dy), maxLimit);
      const angle = Math.atan2(dy, dx);
      const moveX = Math.cos(angle) * distance; const moveY = Math.sin(angle) * distance;

      joystickPoint.style.transform = `translate(${moveX}px, ${moveY}px)`;
      moveDirection.x = moveX / maxLimit;
      moveDirection.z = moveY / maxLimit; 
    }
  });

  window.addEventListener('pointerup', (e) => {
    if (e.pointerId === joyPointerId) {
      joyPointerId = null; joystickPoint.style.transform = `translate(0px, 0px)`;
      moveDirection.x = 0; moveDirection.z = 0;
    }
  });

  // Caméra Roblox Glissement Inversé
  const cameraZone = document.getElementById('touch-zone-right');
  let camPointerId = null; let prevCamX = 0, prevCamY = 0;

  cameraZone.addEventListener('pointerdown', (e) => {
    if(e.target.id === 'jumpButton') return;
    e.preventDefault(); camPointerId = e.pointerId;
    prevCamX = e.clientX; prevCamY = e.clientY;
  });

  window.addEventListener('pointermove', (e) => {
    if (e.pointerId === camPointerId) {
      e.preventDefault();
      const movementX = e.clientX - prevCamX; const movementY = e.clientY - prevCamY;
      cameraOrbit.theta -= movementX * CONFIG.cameraSensitivity;
      cameraOrbit.phi += movementY * CONFIG.cameraSensitivity;
      cameraOrbit.phi = Math.max(0.01, Math.min(Math.PI / 2 - 0.05, cameraOrbit.phi));
      prevCamX = e.clientX; prevCamY = e.clientY;
    }
  });

  window.addEventListener('pointerup', (e) => { if (e.pointerId === camPointerId) camPointerId = null; });

  document.getElementById('jumpButton').addEventListener('pointerdown', (e) => {
    e.preventDefault(); e.stopPropagation();
    if (isGrounded && jumpPhase === 'grounded') {
      jumpPhase = 'takeoff';
      takeoffTimer = 0.08; // Petite phase d'extension musculaire avant de décoller
    }
  });
}

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1);

  updateRealisticPhysics(delta);
  processAnatomicalAnimations(delta);
  updateCameraInstant();

  renderer.render(scene, camera);
}

function updateRealisticPhysics(delta) {
  const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  camForward.y = 0; camForward.normalize();
  const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
  camRight.y = 0; camRight.normalize();

  const targetMove = new THREE.Vector3()
    .addScaledVector(camRight, moveDirection.x)
    .addScaledVector(camForward, -moveDirection.z);

  if (targetMove.lengthSq() > 1) targetMove.normalize();

  // Inertie mécanique
  if (targetMove.lengthSq() > 0.001 && jumpPhase !== 'takeoff') {
    currentVelocity.lerp(targetMove.clone().multiplyScalar(CONFIG.maxSpeed), CONFIG.acceleration * delta);
  } else {
    currentVelocity.lerp(new THREE.Vector3(0,0,0), CONFIG.friction * delta);
  }

  const oldPos = playerGroup.position.clone();
  playerGroup.position.addScaledVector(currentVelocity, delta);

  // Collisions fluides
  const playerRadius = 0.35;
  let onObject = false;

  for (let i = 0; i < collidableObjects.length; i++) {
    const obj = collidableObjects[i]; const objPos = obj.mesh.position;
    if (Math.abs(playerGroup.position.x - objPos.x) < (obj.w/2 + playerRadius) &&
        Math.abs(playerGroup.position.z - objPos.z) < (obj.d/2 + playerRadius)) {
        if (oldPos.y >= (objPos.y + obj.h/2 - 0.25)) {
          playerGroup.position.y = objPos.y + obj.h/2;
          velocityY = 0;
          if(!isGrounded) { jumpPhase = 'landing'; landingTimer = 0.2; }
          isGrounded = true; onObject = true;
        } else {
          playerGroup.position.x = oldPos.x; playerGroup.position.z = oldPos.z;
          currentVelocity.set(0,0,0);
        }
    }
  }

  // Gestion des phases de Saut complexes
  if (jumpPhase === 'takeoff') {
    takeoffTimer -= delta;
    if (takeoffTimer <= 0) {
      velocityY = CONFIG.jumpForce;
      isGrounded = false;
      jumpPhase = 'air';
    }
  }

  if (!onObject && jumpPhase !== 'takeoff') {
    velocityY -= CONFIG.gravity * delta;
    playerGroup.position.y += velocityY * delta;

    if (playerGroup.position.y <= 0) {
      playerGroup.position.y = 0; velocityY = 0;
      if (!isGrounded) { jumpPhase = 'landing'; landingTimer = 0.25; }
      isGrounded = true;
    }
  }

  // Rotation fluide face à la trajectoire
  if (currentVelocity.lengthSq() > 0.1) {
    const targetAngle = Math.atan2(currentVelocity.x, currentVelocity.z);
    let diff = targetAngle - playerGroup.rotation.y;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    playerGroup.rotation.y += diff * 15 * delta;
  }
}

// MOTEUR D'ANIMATION ANATOMIQUE COMPLEXE
function processAnatomicalAnimations(delta) {
  const speed = currentVelocity.length();
  const speedRatio = speed / CONFIG.maxSpeed;
  const time = performance.now() * 0.0075;

  // Réinitialisation par défaut des jointures pour l'interpolation
  pelvis.position.y = 0.95; pelvis.rotation.set(0,0,0);
  torso.rotation.set(0,0,0); head.rotation.set(0,0,0);
  leftThigh.rotation.set(0,0,0); leftShin.rotation.set(0,0,0);
  rightThigh.rotation.set(0,0,0); rightShin.rotation.set(0,0,0);
  leftUpperArm.rotation.set(0,0,0); leftForearm.rotation.set(0,0,0);
  rightUpperArm.rotation.set(0,0,0); rightForearm.rotation.set(0,0,0);

  // 1. PHASE DE JUMP : IMPULSION (Tassement des muscles)
  if (jumpPhase === 'takeoff') {
    pelvis.position.y = 0.75; // Abaissement
    leftThigh.rotation.x = -0.5; leftShin.rotation.x = 0.8;
    rightThigh.rotation.x = -0.5; rightShin.rotation.x = 0.8;
    leftUpperArm.rotation.x = -0.3; rightUpperArm.rotation.x = -0.3;
    return;
  }

  // 2. PHASE DE JUMP : EN L'AIR (Extension puis préparation à l'impact)
  if (!isGrounded || jumpPhase === 'air') {
    torso.rotation.x = 0.05;
    if (velocityY > 0) { // Montée
      leftThigh.rotation.x = -0.2; leftShin.rotation.x = 0.3;
      rightThigh.rotation.x = 0.1; rightShin.rotation.x = 0.2;
      leftUpperArm.rotation.set(0.5, 0, -0.2); rightUpperArm.rotation.set(-0.3, 0, 0.2);
    } else { // Descente planée
      leftThigh.rotation.x = -0.4; leftShin.rotation.x = 0.6;
      rightThigh.rotation.x = -0.3; rightShin.rotation.x = 0.4;
      leftUpperArm.rotation.x = 0.3; rightUpperArm.rotation.x = 0.3;
    }
    return;
  }

  // 3. PHASE DE JUMP : LANDING AMORTI (Absorption cinétique de l'impact)
  if (jumpPhase === 'landing') {
    landingTimer -= delta;
    const progress = landingTimer / 0.25;
    const flexIntensity = Math.sin(progress * Math.PI) * 0.35;
    
    pelvis.position.y -= flexIntensity * 0.8;
    torso.rotation.x = flexIntensity * 0.9;
    leftThigh.rotation.x = -flexIntensity * 1.8; leftShin.rotation.x = flexIntensity * 2.2;
    rightThigh.rotation.x = -flexIntensity * 1.8; rightShin.rotation.x = flexIntensity * 2.2;
    leftUpperArm.rotation.x = -flexIntensity; rightUpperArm.rotation.x = -flexIntensity;

    if (landingTimer <= 0) jumpPhase = 'grounded';
    return;
  }

  // 4. ANIMATION DE RUN (Course organique calquée sur la physiologie)
  if (speedRatio > 0.05) {
    const wave = Math.sin(time * 2.2);
    const doubleWave = Math.sin(time * 4.4);

    // Oscillation du bassin et inclinaisons du torse
    pelvis.position.y += doubleWave * 0.04 * speedRatio;
    pelvis.rotation.y = wave * 0.15 * speedRatio; // Torsion des hanches
    torso.rotation.x = (0.18 + doubleWave * 0.02) * speedRatio; // Buste vers l'avant
    torso.rotation.y = -wave * 0.12 * speedRatio; // Opposition épaules/hanches

    // Jambes : Articulation Hanche + Pli du genou synchrone
    leftThigh.rotation.x = wave * 0.75 * speedRatio;
    if (wave > 0) {
      leftShin.rotation.x = (wave * 0.8) * speedRatio; // Pli du genou vers l'arrière
    } else {
      leftShin.rotation.x = (-wave * 0.2) * speedRatio; // Extension vers l'avant
    }

    rightThigh.rotation.x = -wave * 0.75 * speedRatio;
    if (wave < 0) {
      rightShin.rotation.x = (-wave * 0.8) * speedRatio;
    } else {
      rightShin.rotation.x = (wave * 0.2) * speedRatio;
    }

    // Bras : Coudes pliés fixes balancés de façon agressive
    leftUpperArm.rotation.set(-wave * 0.65 * speedRatio, 0, -0.1);
    leftForearm.rotation.x = -0.5 - (wave * 0.15); // Coude verrouillé réaliste

    rightUpperArm.rotation.set(wave * 0.65 * speedRatio, 0, 0.1);
    rightForearm.rotation.x = -0.5 + (wave * 0.15);

    head.rotation.x = -torso.rotation.x + 0.05;
  } 
  // 5. ANIMATION D'IDLE (Respiration et micro-mouvements de stabilisation)
  else {
    const breath = Math.sin(performance.now() * 0.0025);
    const microMove = Math.cos(performance.now() * 0.001);

    pelvis.position.y += breath * 0.012;
    torso.rotation.x = 0.03 + breath * 0.01;
    torso.rotation.z = microMove * 0.015; // Léger balancement gauche/droite

    // Posture de repos des membres
    leftThigh.rotation.set(0.05, 0, -0.02); leftShin.rotation.x = 0.05;
    rightThigh.rotation.set(-0.02, 0, 0.02); rightShin.rotation.x = 0.02;

    leftUpperArm.rotation.set(breath * 0.03, 0, -0.08 + (microMove * 0.01));
    leftForearm.rotation.x = -0.15;
    rightUpperArm.rotation.set(-breath * 0.03, 0, 0.08 + (microMove * 0.01));
    rightForearm.rotation.x = -0.15;
  }
}

function updateCameraInstant() {
  camera.position.x = playerGroup.position.x + cameraOrbit.radius * Math.sin(cameraOrbit.theta) * Math.cos(cameraOrbit.phi);
  camera.position.y = playerGroup.position.y + cameraOrbit.targetY + cameraOrbit.radius * Math.sin(cameraOrbit.phi);
  camera.position.z = playerGroup.position.z + cameraOrbit.radius * Math.cos(cameraOrbit.theta) * Math.cos(cameraOrbit.phi);
  camera.lookAt(playerGroup.position.x, playerGroup.position.y + cameraOrbit.targetY, playerGroup.position.z);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
