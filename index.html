<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jeu Mobile 3D avec Joystick</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial; }

  /* Bouton Play centré */
  #playButton {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    padding: 20px 40px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 10;
  }

  /* Zone joystick */
  #joystickContainer {
    position: absolute;
    bottom: 20px; left: 20px;
    width: 150px; height: 150px;
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    touch-action: none;
    display: none; /* caché au début */
  }

  /* Point central du joystick */
  #joystickPoint {
    position: absolute;
    top: 50%; left: 50%;
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  /* Canvas pour rendu 3D */
  canvas { display: block; width: 100%; height: 100vh; }
</style>
</head>
<body>

<button id="playButton">PLAY</button>
<div id="joystickContainer">
  <div id="joystickPoint"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let character;
let moveX = 0, moveZ = 0;
let clock = new THREE.Clock();

const startGame = () => {
  document.getElementById('playButton').style.display = 'none';
  document.getElementById('joystickContainer').style.display = 'block';

  init();
  animate();
};

document.getElementById('playButton').addEventListener('click', startGame);

// Initialisation scène
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Sol
  const floorGeo = new THREE.PlaneGeometry(50, 50);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x228b22 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Personnage (avec corps, bras, jambes)
  character = new THREE.Group();

  // Tête
  const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const headMat = new THREE.MeshPhongMaterial({ color: 0xffcc99 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 2.5;
  character.add(head);

  // Corps
  const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 16);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0x0000ff });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.5;
  character.add(body);

  // Bras
  const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 1, 16);
  const armMat = new THREE.MeshPhongMaterial({ color: 0xffcc99 });
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.4, 2, 0);
  leftArm.rotation.z = Math.PI/4;
  const rightArm = leftArm.clone();
  rightArm.position.set(0.4, 2, 0);
    rightArm.rotation.z = -Math.PI/4;
  character.add(leftArm);
  character.add(rightArm);

  // Jambes
  const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 1, 16);
  const legMat = new THREE.MeshPhongMaterial({ color: 0x0000ff });
  const leftLeg = new THREE.Mesh(legGeo, legMat);
  leftLeg.position.set(-0.2, 0.5, 0);
  const rightLeg = leftLeg.clone();
  rightLeg.position.set(0.2, 0.5, 0);
  character.add(leftLeg);
  character.add(rightLeg);

  // Position initiale
  character.position.y = 0.5;
  scene.add(character);

  // Lumière
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7.5);
  scene.add(dirLight);

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Contrôles joystick
  initJoystick();
}

// Animation
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  // Déplacement du personnage
  character.position.x += moveX * delta * 3;
  character.position.z += moveZ * delta * 3;

  // Limites
  character.position.x = Math.max(-24, Math.min(24, character.position.x));
  character.position.z = Math.max(-24, Math.min(24, character.position.z));

  // Caméra suit le personnage
  camera.position.x = character.position.x + 0;
  camera.position.z = character.position.z + 6;
  camera.position.y = character.position.y + 3;
  camera.lookAt(character.position);

  renderer.render(scene, camera);
}

// Joystick
function initJoystick() {
  const container = document.getElementById('joystickContainer');
  const point = document.getElementById('joystickPoint');
  let pointerId = null;
  let startX = 0, startY=0, currentX=0, currentY=0;

  container.addEventListener('pointerdown', e => {
    pointerId = e.pointerId;
    startX = e.clientX;
    startY = e.clientY;
    currentX = startX;
    currentY = startY;
  });
  container.addEventListener('pointermove', e => {
    if(e.pointerId===pointerId){
      currentX = e.clientX;
      currentY = e.clientY;
      // Calcul du déplacement
      const dx = currentX - startX;
      const dy = currentY - startY;
      const maxDist = 50;
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxDist);
      const angle = Math.atan2(dy, dx);
      // Limite le point au cercle
      const x = Math.cos(angle) * dist;
      const y = Math.sin(angle) * dist;
      point.style.transform = `translate(${x}px, ${y}px)`;
      // Met à jour la direction
      moveX = (x / maxDist);
      moveZ = (y / maxDist);
    }
  });
  container.addEventListener('pointerup', e => {
    if(e.pointerId===pointerId){
      pointerId = null;
      // Centrer le point
      document.getElementById('joystickPoint').style.transform = `translate(0,0)`;
      moveX = 0;
      moveZ = 0;
    }
  });
}
</script>
</body>
</html>
